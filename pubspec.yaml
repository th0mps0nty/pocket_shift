name: pocket_shift
description: Pocket Shift is a gentle micro-habit tracker for noticing small shifts.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.1
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.4.2
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/branding/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
